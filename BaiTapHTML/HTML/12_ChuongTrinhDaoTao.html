<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chương Trình Đào Tạo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #333333; /* Màu nền tối bao quanh giống ảnh mẫu */
            display: flex;
            justify-content: center;
        }

        /* Khung chứa chính có hình nền thiên nhiên giống image_924cfe.jpg */
        .training-container {
            width: 100%;
            max-width: 1100px;
            height: 480px; /* Chiều cao cố định phù hợp để giữ form ảnh */
            background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200&auto=format&fit=crop&q=80'); 
            background-size: cover;
            background-position: center;
            border: 1px solid #000;
            position: relative;
            padding: 30px 40px;
        }

        /* Khối nội dung chữ nằm ở góc trên bên trái */
        .training-content {
            max-width: 500px;
            text-align: left;
        }

        /* Tiêu đề lớn "CHƯƠNG TRÌNH ĐÀO TẠO" màu xanh đậm */
        .main-title {
            color: #0b3c75;
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Các tiêu đề phụ màu đỏ (TIN HỌC VĂN PHÒNG, TIN HỌC QUẢN LÝ) */
        .sub-title {
            color: #c00000;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        /* Danh sách các môn học nhỏ bên trong */
        .course-list {
            list-style: none; /* Bỏ dấu chấm tròn mặc định */
            padding-left: 15px;
        }

        .course-list li {
            color: #000000;
            font-size: 0.9rem;
            font-weight: bold;
            line-height: 1.5;
            position: relative;
        }

        /* Thêm khoảng cách đầu dòng nhỏ cho giống ảnh gốc */
        .course-list li::before {
            content: "";
            display: inline-block;
            width: 5px;
            margin-right: 5px;
        }

        /* Tự động co giãn mượt mà khi xem trên màn hình nhỏ */
        @media (max-width: 768px) {
            .training-container {
                height: auto;
                min-height: 400px;
                background-position: right center; /* Dịch ảnh sang phải để không che chữ */
                padding: 20px;
            }
            .main-title { font-size: 1.2rem; }
            .sub-title { font-size: 0.9rem; }
            .course-list li { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <!-- Bắt đầu khung nội dung mô phỏng theo image_924cfe.jpg -->
    <div class="training-container">
        <div class="training-content">
            
            <h2 class="main-title">Chương Trình Đào Tạo</h2>

            <!-- Nhóm 1: Tin học văn phòng -->
            <h3 class="sub-title">Tin Học Văn Phòng</h3>
            <ul class="course-list">
                <li>Tin học căn bản & WindowsXP</li>
                <li>Soạn Thảo văn bản MicroSoft Word 2003</li>
                <li>Xử lý bảng tính MicroSoft Excel 2003</li>
            </ul>

            <!-- Nhóm 2: Tin học quản lý -->
            <h3 class="sub-title">Tin Học Quản Lý</h3>
            <ul class="course-list">
                <li>Lập trình CSDL MicroSoft Access 2003</li>
                <li>Thiết kế trình chiếu MicroSoft PowerPoint 2003</li>
            </ul>

        </div>
    </div>

</body>
</html>
