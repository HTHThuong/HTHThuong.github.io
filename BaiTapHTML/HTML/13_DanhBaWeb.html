<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Bạ Website</title>
    <style>
        /* Toàn bộ cài đặt hệ thống font và nền trang */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
            color: #333;
            line-height: 1.6;
            padding: 40px 20px;
        }

        /* Khung container chính chứa nội dung */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* Tiêu đề chính */
        h1 {
            text-align: center;
            color: #1e3a8a;
            font-size: 2rem;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }

        h1::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: #3b82f6;
            margin: 10px auto 0;
            border-radius: 2px;
        }

        /* Các khối danh mục (Tin tức, Giải trí) */
        .category {
            margin-bottom: 30px;
        }

        .category h2 {
            color: #2563eb;
            font-size: 1.25rem;
            margin-bottom: 15px;
            border-left: 4px solid #2563eb;
            padding-left: 10px;
        }

        .links-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        /* Định dạng các thẻ chứa link */
        .links-list li a {
            display: block;
            padding: 12px 16px;
            background: #f8fafc;
            color: #475569;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .links-list li a:hover {
            background: #3b82f6;
            color: #ffffff;
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        /* Khu vực quảng cáo */
        .ads-section {
            margin-top: 40px;
        }

        .ads-section h2 {
            color: #dc2626;
            font-size: 1.25rem;
            margin-bottom: 15px;
            border-left: 4px solid #dc2626;
            padding-left: 10px;
        }

        .ads-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 600px) {
            .ads-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Khung ảnh quảng cáo tinh tế */
        .ad-card {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            aspect-ratio: 1 / 1;
        }

        .ad-card:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .ad-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Đường gạch chân trang */
        hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 40px 0 20px;
        }

        /* Chân trang thông tin liên hệ */
        .footer {
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
        }

        .footer a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            padding-bottom: 2px;
            border-bottom: 1px dashed #3b82f6;
        }

        .footer a:hover {
            color: #1d4ed8;
            border-bottom-style: solid;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Danh Bạ Website</h1>

        <div class="category">
            <h2>📰 Tin Tức</h2>
            <ul class="links-list">
                <li><a href="#" target="_blank">Tin tức Việt Nam</a></li>
                <li><a href="#" target="_blank">Báo tuổi trẻ</a></li>
            </ul>
        </div>

        <div class="category">
            <h2>🎵 Giải Trí</h2>
            <ul class="links-list">
                <li><a href="#" target="_blank">Nhạc số Online</a></li>
                <li><a href="#" target="_blank">Giới thiệu ngôi sao</a></li>
            </ul>
        </div>

        <div class="ads-section">
            <h2>🔥 Liên kết quảng cáo</h2>
            <div class="ads-grid">
                <div class="ad-card">
                    <a href="#" target="_blank">
                        <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=500&auto=format&fit=crop&q=80" alt="Quảng cáo Concert âm nhạc">
                    </a>
                </div>
                <div class="ad-card">
                    <a href="#" target="_blank">
                        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=500&auto=format&fit=crop&q=80" alt="Quảng cáo DJ nghệ sĩ mới">
                    </a>
                </div>
            </div>
        </div>

        <hr>

        <div class="footer">
            Liên hệ: <a href="mailto:contact@example.com">Gửi mail hợp tác</a>
        </div>
    </div>

</body>
</html>
