<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Khóa Học Coding - Nâu & Be Dịu Nhẹ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f7ebe1; /* Đổi nền trang sang màu be ấm dịu */
            padding: 15px 20px;
        }

        /* KHUNG BANNER: Chuyển sang tông Nâu Sô-cô-la sang trọng */
        .cyber-banner {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            background: linear-gradient(135deg, #2d1e18 0%, #3e2723 50%, #5d4037 100%);
            border-radius: 14px;
            padding: 15px 35px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            overflow: hidden;
            border: 1px solid rgba(247, 235, 225, 0.1);
            border-bottom: 4px solid #bcaaa4; /* Viền dưới màu be xám dịu */
            box-shadow: 0 12px 30px rgba(45, 30, 24, 0.3);
        }

        /* Tạo một luồng sáng ấm quét qua banner định kỳ */
        .cyber-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.08), transparent);
            transform: skewX(-25deg);
            animation: shineBanner 6s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes shineBanner {
            0% { left: -150%; }
            50% { left: -150%; }
            100% { left: 150%; }
        }

        /* KHỐI BÊN TRÁI */
        .banner-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
            z-index: 2;
        }

        /* VÒNG TRÒN PHÁT SÁNG DỊU: Chuyển sang dải màu Be - Vàng Hổ Phách */
        .tech-circle {
            position: relative;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(0deg, #8d6e63, #ffcc80, #d7ccc8);
            box-shadow: 0 0 15px rgba(255, 204, 128, 0.35); /* Phát sáng hổ phách nhẹ */
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotateGlow 4s linear infinite;
        }

        @keyframes rotateGlow {
            100% { transform: rotate(360deg); }
        }

        /* LOGO THỎ SVG: Nền nâu đậm hài hòa */
        .tech-circle .logo-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #3e2723; 
            border: 2px solid #2d1e18;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-360deg);
            animation: antiRotate 4s linear infinite;
            overflow: hidden;
        }

        @keyframes antiRotate {
            100% { transform: rotate(-360deg); }
        }

        .tech-circle svg {
            width: 75%;
            height: 75%;
        }

        /* Thay đổi màu sắc của thỏ SVG gốc để hợp với tông nâu be */
        .tech-circle svg path[stroke="#00f2fe"],
        .tech-circle svg circle[stroke="#00f2fe"] {
            stroke: #ffcc80;
        }
        .tech-circle svg path[fill="#1363df"] {
            fill: #6d4c41;
        }

        /* KHỐI TIÊU ĐỀ CHỮ */
        .text-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .text-group h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        /* Chữ "Thực Chiến WEB" nhấp nháy màu vàng kem mịn */
        .text-group h1 span {
            font-size: 1.7rem;
            font-weight: 900;
            background: linear-gradient(to right, #ffe0b2, #ffcc80, #bcaaa4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 8px rgba(255, 204, 128, 0.4);
            margin-left: 5px;
            animation: pulseNeon 3s infinite alternate;
        }

        @keyframes pulseNeon {
            0%, 100% { filter: drop-shadow(0 0 2px rgba(255, 204, 128, 0.4)); }
            50% { filter: drop-shadow(0 0 6px rgba(255, 204, 128, 0.7)); }
        }

        .quote-text {
            font-size: 0.85rem;
            color: #d7ccc8; /* Màu be sáng dịu cho câu quote */
            font-style: italic;
            max-width: 480px;
            line-height: 1.3;
            opacity: 0.85;
        }

        /* KHỐI BÊN PHẢI */
        .banner-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 2;
        }

        /* Badge thông tin màu nâu đất tinh tế */
        .badge-info {
            background: linear-gradient(90deg, #5d4037 0%, #4e342e 100%);
            color: #ffe0b2;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 224, 178, 0.2);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            animation: bounceBadge 2s infinite alternate;
        }

        @keyframes bounceBadge {
            0% { transform: translateY(0); }
            100% { transform: translateY(-3px); }
        }

        /* NÚT BẮT ĐẦU: Chuyển sang tông màu Be Kem phát sáng vàng nhạt */
        .btn-start {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(90deg, #f7ebe1, #ffcc80, #f7ebe1);
            background-size: 200% auto;
            color: #3e2723; /* Chữ màu nâu đậm dễ đọc */
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 8px 24px;
            border-radius: 25px;
            box-shadow: 0 0 15px rgba(255, 204, 128, 0.3);
            transition: all 0.3s ease;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .btn-start:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 204, 128, 0.6);
            color: #2d1e18;
        }

        /* Icon tên lửa */
        .btn-start:hover .rocket-icon {
            animation: rocketWobble 0.5s infinite linear;
        }

        @keyframes rocketWobble {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(1px, -1px) rotate(3deg); }
            75% { transform: translate(-1px, 1px) rotate(-3deg); }
        }

        /* Responsive Mobile */
        @media (max-width: 850px) {
            .cyber-banner {
                flex-direction: column;
                align-items: flex-start;
                padding: 20px;
            }
            .banner-right {
                align-items: flex-start;
                width: 100%;
                margin-top: 10px;
                border-top: 1px solid rgba(255,255,255,0.1);
                padding-top: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="cyber-banner">
        
        <div class="banner-left">
            <div class="tech-circle">
                <div class="logo-wrapper">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 20C22 10 26 6 28 6C30 6 30 10 28 20Z" fill="#FFF" stroke="#ffcc80" stroke-width="1.5"/>
                        <path d="M24 18C24 12 26 9 27 9C28 9 28 12 27 18Z" fill="#FFB6C1"/>
                        <path d="M34 20C34 10 30 6 28 6C26 6 26 10 28 20Z" fill="#FFF" stroke="#ffcc80" stroke-width="1.5"/>
                        <path d="M32 18C32 12 30 9 29 9C28 9 28 12 29 18Z" fill="#FFB6C1"/>
                        <circle cx="28" cy="28" r="11" fill="#FFF" stroke="#ffcc80" stroke-width="1.5"/>
                        <circle cx="25" cy="26" r="1.5" fill="#333"/>
                        <circle cx="31" cy="26" r="1.5" fill="#333"/>
                        <ellipse cx="23" cy="29" rx="1.5" ry="1" fill="#FFB6C1"/>
                        <ellipse cx="33" cy="29" rx="1.5" ry="1" fill="#FFB6C1"/>
                        <path d="M27 28.5 L29 28.5 L28 29.5 Z" fill="#FFB6C1"/>
                        <path d="M16 46 L44 46 L48 54 L12 54 Z" fill="#6d4c41" stroke="#ffcc80" stroke-width="1.5"/>
                        <path d="M18 48 H42 M20 51 H44" stroke="#FFF" stroke-width="1" stroke-linecap="round"/>
                        <circle cx="20" cy="42" r="2.5" fill="#FFF" stroke="#ffcc80" stroke-width="1"/>
                        <circle cx="36" cy="42" r="2.5" fill="#FFF" stroke="#ffcc80" stroke-width="1"/>
                    </svg>
                </div>
            </div>
            
            <div class="text-group">
                <h1>Khóa Học Coding <span>Thực Chiến WEB</span></h1>
                <p class="quote-text">"Đừng chỉ học lý thuyết, hãy xây dựng những dự án thực tế ngay hôm nay."</p>
            </div>
        </div>

        <div class="banner-right">
            <div class="badge-info">Khám Phá Chương Trình Học Toàn Diện</div>
            <a href="#" class="btn-start">
                Bắt đầu Thôi! <span class="rocket-icon">🚀</span>
            </a>
        </div>

    </div>

</body>
</html>
