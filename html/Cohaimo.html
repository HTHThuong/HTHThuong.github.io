<h3><b>CÔ HÁI MƠ</b></h3>

<p>
<i>
Thơ thẩn đường chiều một khách thơ,<br>
Say nhìn xa rặng núi xanh lơ,<br>
Khí trời lắng lẽ và trong trẻo,<br>
Thấp thoáng rừng mơ, Cô hái mơ.
</i>
</p>

<p><i>Tác giả: Vô Danh</i></p>
